
<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Woody | 網管與資安維運實踐</title>
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0b10">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Woody 維運">
  <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1558494949-ef010cbdcc31?auto=format&fit=crop&q=80&w=192&h=192">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            morandi: {
              sage: '#B8C6C3',
              rose: '#D8B4A6',
              slate: '#2D3436',
              stone: '#434C5E',
              cream: '#E9E5E3'
            }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #0a0b10;
      --text-main: #ffffff;
      --text-sub: #cbd5e1;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.15);
      --accent-primary: #ffffff;
      --card-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.6);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html.light {
      --bg-base: #E9E5E3;
      --text-main: #2D3436;
      --text-sub: #434C5E;
      --glass-bg: rgba(255, 255, 255, 0.8);
      --glass-border: rgba(45, 52, 54, 0.2);
      --accent-primary: #2D3436;
      --card-shadow: 0 10px 40px -10px rgba(45, 52, 54, 0.15);
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg-base);
      color: var(--text-sub);
      font-family: 'Outfit', 'Noto Sans TC', sans-serif;
      overflow-x: hidden;
      /* 禁止手機端下拉重新整理（若需要 PWA 感更強烈） */
      overscroll-behavior-y: contain;
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(40px) saturate(150%);
      -webkit-backdrop-filter: blur(40px) saturate(150%);
      border: 1px solid var(--glass-border);
      border-radius: 40px;
      box-shadow: var(--card-shadow);
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .heading-gradient {
      background: linear-gradient(180deg, var(--text-main) 0%, var(--text-sub) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .text-glow {
      text-shadow: 0 0 40px rgba(255, 255, 255, 0.15);
    }
    html.light .text-glow {
      text-shadow: 0 0 20px rgba(45, 52, 54, 0.1);
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "@react-three/fiber": "https://esm.sh/@react-three/fiber@^9.4.2",
    "@react-three/drei": "https://esm.sh/@react-three/drei@^10.7.7",
    "three": "https://esm.sh/three@^0.182.0",
    "framer-motion": "https://esm.sh/framer-motion@^12.23.26",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
